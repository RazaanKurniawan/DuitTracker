services:
  - type: web
    name: duittracker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: duittracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /api/health

databases:
  - name: duittracker-db
    databaseName: duittracker
    user: duittracker
